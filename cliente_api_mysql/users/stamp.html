<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Firma Segura APP</title>
</head>
<body>
    <main class="legacy-shell">
        <section class="legacy-hero legacy-hero--compact">
            <div class="eyebrow">Usuarios</div>
            <h1>Control de sellos</h1>
            <p>Gestiona sellos y archivos asociados desde la misma base visual.</p>
        </section>

        <section class="legacy-panel">
            <main id="main-container"></main>

            <div hidden id="loader"><h1 style="color: #ff00ff;">LOADING...</h1></div>

            <form hidden id="stampSelect" onsubmit="createStamp()" method="POST" accept-charset="utf-8" enctype="multipart/form-data">
                <p>Select a file jpg or png file:</p>
                <input type="file" id="file" />
            </form>

            <div class="legacy-actions">
                <button id="createStamp" onclick="createStamp()">Create Stamp</button>
                <button id="deleteStamp" onclick="deleteStamp()">Delete</button>
            </div>

            <div id="button-container"></div>
        </section>
    </main>
<script src="stamp.js"></script>
</body>
</html>
