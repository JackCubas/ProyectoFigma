<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/style.css">
        <title>Firma Segura APP</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.js"></script>
    </head>
    <body>
        <main class="legacy-shell">
            <section class="legacy-hero legacy-hero--compact">
                <div class="eyebrow">Acceso seguro</div>
                <h1>Iniciar sesión</h1>
                <p>Accede al sistema con una interfaz limpia y coherente con el resto de la aplicación.</p>
            </section>

            <section class="legacy-panel">
                <div class="create-blog content">
                    <form id="form">
                        <lable for="emailUser">Email:</lable>
                        <input type="text" id="emailUser" name="emailUser" maxlength="50" required>
                        <lable for="passUser">Pass:</lable>
                        <input type="password" id="passUser" name="passUser" maxlength="50" minlength="6" required>
                    </form>
                    <div id="button-container"></div>
                    <div class="legacy-actions">
                        <button onclick="location.href='../index.html'" type="button">Cancelar</button>
                    </div>
                </div>
            </section>
        </main>

        <script src="login.js"></script>

    </body>
</html>
