<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/style.css">
        <title>Firma Segura APP</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.js"></script>
    </head>
    <body>
        <main class="legacy-shell">
            <section class="legacy-hero legacy-hero--compact">
                <div class="eyebrow">Acceso seguro</div>
                <h1>Crear cuenta</h1>
                <p>Registra un nuevo usuario con la misma interfaz ordenada y sobria del sistema.</p>
            </section>

            <section class="legacy-panel">
                <div class="create-blog content">
                    <form id="form">
                        <lable for="nameUser">Name:</lable>
                        <input type="text" id="nameUser" name="nameUser" maxlength="50" minlength="2" required>
                        <lable for="emailUser">Email:</lable>
                        <input type="email" pattern="[^@\s]+@[^@\s]+\.[^@\s]+" id="emailUser" name="emailUser" maxlength="50" required>
                        <lable for="passUser">Pass:</lable>
                        <input type="password" id="passUser" name="passUser" maxlength="50" minlength="6" required>
                        <lable for="passUserRepeat">Repeat Pass:</lable>
                        <input type="password" id="passUserRepeat" name="passUserRepeat" maxlength="50" minlength="6" required>
                        <select id="rolUser" name="rolUser">
                            <option value="CLIENT">CLIENT</option>
                            <option value="FIRMA">FIRMA</option>
                        </select>
                        <lable for="dniUser">DNI:</lable>
                        <input type="text" pattern="[0-9]{8}[A-Za-z]{1}" id="dniUser" name="dniUser" maxlength="9" minlength="9" required>
                    </form>
                    <div id="button-container"></div>
                    <div class="legacy-actions">
                        <button onclick="location.href='../index.html'" type="button">Cancelar</button>
                    </div>
                </div>
            </section>
        </main>

        <script src="signup.js"></script>

    </body>
</html>
