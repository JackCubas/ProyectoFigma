<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Firma Segura APP</title>
</head>
<body>
    <main class="legacy-shell">
        <section class="legacy-hero legacy-hero--compact">
            <div class="eyebrow">PDFs</div>
            <h1>Crear sello</h1>
            <p>Alta de sello con la misma estructura visual del resto de pantallas.</p>
        </section>

        <section class="legacy-panel">
            <div hidden id="loader"><h1 style="color: #ff00ff;">LOADING...</h1></div>
            <form onsubmit="sendData()" method="POST" accept-charset="utf-8" enctype="multipart/form-data">
                <p>Select a file jpg or png file:</p>
                <input type="file" id="file" />
            </form>
            <div class="legacy-actions">
                <button onclick="sendData()">Submit</button>
                <button onclick="location.href='table.html'" type="button">Cancel</button>
            </div>
        </section>
    </main>
<script src="createStamp.js"></script>
</body>
</html>
