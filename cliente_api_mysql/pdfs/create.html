<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Firma Segura APP</title>
</head>
<body>
    <main class="legacy-shell">
        <section class="legacy-hero legacy-hero--compact">
            <div class="eyebrow">PDFs</div>
            <h1>Crear documento</h1>
            <p>Alta de documento en una interfaz uniforme, limpia y centrada en la tarea.</p>
        </section>

        <section class="legacy-panel">
            <form accept-charset="utf-8" enctype="multipart/form-data">
                <div class="formgroup container-fluid">
                    <label for="name">Name</label>
                    <input id="name" type="text" name="name" maxlength="50" required/>
                </div>
                <p>Select a file:</p>
                <input type="file" id="file" />
            </form>
            <div id="button-container"></div>
        </section>
    </main>

<script src="create.js"></script>
</body>
</html>
